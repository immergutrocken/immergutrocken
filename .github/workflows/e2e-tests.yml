name: e2e-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent parallel runs to avoid interference with the shared e2e-test dataset
concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  test-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Check required secrets
        run: |
          failed=0
          if [ -z "$SANITY_API_TOKEN" ]; then
            echo "ERROR: SANITY_API_TOKEN secret is not set"
            failed=1
          else
            echo "SANITY_API_TOKEN is set (length: ${#SANITY_API_TOKEN})"
          fi
          if [ -z "$SANITY_USER_EMAIL" ]; then
            echo "ERROR: SANITY_USER_EMAIL secret is not set"
            failed=1
          else
            echo "SANITY_USER_EMAIL is set"
          fi
          if [ -z "$SANITY_USER_PASSWORD" ]; then
            echo "ERROR: SANITY_USER_PASSWORD secret is not set"
            failed=1
          else
            echo "SANITY_USER_PASSWORD is set"
          fi
          exit $failed
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_USER_EMAIL: ${{ secrets.SANITY_USER_EMAIL }}
          SANITY_USER_PASSWORD: ${{ secrets.SANITY_USER_PASSWORD }}

      - name: Ensure e2e-test Sanity dataset exists
        continue-on-error: true
        run: |
          list_response=$(curl -s -w "\n%{http_code}" \
            "https://api.sanity.io/v2021-10-21/projects/05hvmwlk/datasets" \
            -H "Authorization: Bearer $SANITY_API_TOKEN")
          list_body=$(echo "$list_response" | head -n -1)
          list_status=$(echo "$list_response" | tail -n 1)
          echo "Dataset list HTTP $list_status: $list_body"
          if echo "$list_body" | grep -q '"e2e-test"'; then
            echo "e2e-test dataset already exists"
          else
            echo "e2e-test dataset not found — attempting to create it"
            create_response=$(curl -s -w "\n%{http_code}" -X PUT \
              "https://api.sanity.io/v2021-10-21/projects/05hvmwlk/datasets/e2e-test" \
              -H "Authorization: Bearer $SANITY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"aclMode":"private"}')
            create_body=$(echo "$create_response" | head -n -1)
            create_status=$(echo "$create_response" | tail -n 1)
            echo "Dataset creation HTTP $create_status: $create_body"
            if [ "$create_status" != "200" ] && [ "$create_status" != "201" ]; then
              echo "ERROR: Could not create e2e-test dataset (HTTP $create_status)."
              echo "Please create it manually at https://www.sanity.io/manage/personal/project/05hvmwlk/datasets"
              exit 1
            fi
            echo "e2e-test dataset created successfully"
          fi
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Verify Sanity dataset is queryable
        continue-on-error: true
        run: |
          echo "Querying e2e-test dataset via GROQ..."
          response=$(curl -s -w "\n%{http_code}" \
            "https://05hvmwlk.api.sanity.io/v2024-01-01/data/query/e2e-test?query=*%5Bfalse%5D" \
            -H "Authorization: Bearer $SANITY_API_TOKEN")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "GROQ query HTTP $status: $body"
          if [ "$status" != "200" ]; then
            echo "ERROR: Cannot query e2e-test dataset (HTTP $status). Check that the dataset exists and the token has read access."
            exit 1
          fi
          echo "Dataset is queryable"
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          SANITY_STUDIO_DATASET: e2e-test
          SANITY_STUDIO_DATASET_DEVELOPMENT: e2e-test
          SANITY_STUDIO_DATASET_PREVIEW: e2e-test
          SANITY_STUDIO_DATASET_PRODUCTION: e2e-test
          SANITY_STUDIO_PROJECT_ID: "05hvmwlk"
          SANITY_DATASET_E2E: e2e-test
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_USER_EMAIL: ${{ secrets.SANITY_USER_EMAIL }}
          SANITY_USER_PASSWORD: ${{ secrets.SANITY_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e/.auth/*.png
          retention-days: 30
