name: e2e-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent parallel runs to avoid interference with shared E2E dataset
concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  # Get the latest Vercel deployment for the current branch
  get-vercel-deployment:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      cms_url: ${{ steps.get-urls.outputs.cms_url }}
      website_url: ${{ steps.get-urls.outputs.website_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Get latest Vercel deployment URLs
        id: get-urls
        run: |
          # Get the latest deployment URL for the current branch
          # This avoids waiting for a new deployment when only e2e files change
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

          # Use vercel CLI to get the latest deployment
          # For now, use placeholder - will need proper Vercel API integration
          # TODO: Implement proper Vercel API call to get latest deployment for branch

          # Fallback to wait-for-vercel if needed
          echo "cms_url=" >> $GITHUB_OUTPUT
          echo "website_url=" >> $GITHUB_OUTPUT

  test-e2e:
    needs: get-vercel-deployment
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          # Vercel deployment URLs
          CMS_BASE_URL: ${{ needs.get-vercel-deployment.outputs.cms_url }}
          WEBSITE_BASE_URL: ${{ needs.get-vercel-deployment.outputs.website_url }}
          # Sanity configuration
          SANITY_STUDIO_PROJECT_ID: "05hvmwlk"
          SANITY_DATASET_E2E: ${{ secrets.SANITY_DATASET_E2E }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
