name: e2e-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent parallel runs to avoid interference with shared E2E dataset
concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  # Wait for Vercel deployments to complete
  wait-for-vercel:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      cms_url: ${{ steps.get-urls.outputs.cms_url }}
      website_url: ${{ steps.get-urls.outputs.website_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Wait for Vercel Preview Deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: wait-for-vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 10

      - name: Get Deployment URLs
        id: get-urls
        run: |
          # Extract deployment URLs from Vercel
          # The CMS and website should have separate deployments
          # For now, we'll use the preview URL from the action above
          echo "cms_url=${{ steps.wait-for-vercel.outputs.url }}" >> $GITHUB_OUTPUT
          echo "website_url=${{ steps.wait-for-vercel.outputs.url }}" >> $GITHUB_OUTPUT

  test-e2e:
    needs: wait-for-vercel
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          # Vercel deployment URLs
          CMS_BASE_URL: ${{ needs.wait-for-vercel.outputs.cms_url }}
          WEBSITE_BASE_URL: ${{ needs.wait-for-vercel.outputs.website_url }}
          # Sanity configuration
          SANITY_STUDIO_PROJECT_ID: "05hvmwlk"
          SANITY_DATASET_E2E: ${{ secrets.SANITY_DATASET_E2E }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
