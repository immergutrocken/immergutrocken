name: e2e-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent parallel runs to avoid interference with the shared e2e-test dataset
concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  test-e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Check required secrets
        run: |
          if [ -z "$SANITY_API_TOKEN" ]; then
            echo "ERROR: SANITY_API_TOKEN secret is not set"
            exit 1
          else
            echo "SANITY_API_TOKEN is set (length: ${#SANITY_API_TOKEN})"
          fi
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Ensure e2e-test Sanity dataset exists
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://api.sanity.io/v2021-10-21/projects/05hvmwlk/datasets" \
            -H "Authorization: Bearer $SANITY_API_TOKEN")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Dataset list HTTP $status: $body"
          if echo "$body" | grep -q '"e2e-test"'; then
            echo "e2e-test dataset already exists"
          else
            echo "e2e-test dataset not found — creating it"
            curl -s -X PUT \
              "https://api.sanity.io/v2021-10-21/projects/05hvmwlk/datasets/e2e-test" \
              -H "Authorization: Bearer $SANITY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"aclMode":"private"}'
            echo "Dataset created"
          fi
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          SANITY_STUDIO_DATASET: e2e-test
          SANITY_STUDIO_DATASET_DEVELOPMENT: e2e-test
          SANITY_STUDIO_DATASET_PREVIEW: e2e-test
          SANITY_STUDIO_DATASET_PRODUCTION: e2e-test
          SANITY_STUDIO_PROJECT_ID: "05hvmwlk"
          SANITY_DATASET_E2E: e2e-test
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
